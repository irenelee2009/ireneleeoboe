<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irene Lee — Oboist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --sage:#7A9E87; --sage-light:#EAF1EC; }
html, body { height:100%; }

#hero {
  height:100vh;
  background:url('photo.jpg') 60% 20% / 75% auto no-repeat, #0a0a0a;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:44px 56px 52px;
  position:relative;
}
.hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 45%, rgba(0,0,0,0.45) 100%);
}
.hero-top { position:relative; z-index:2; }
.hero-name {
  font-family:'Cinzel',serif;
  font-size:clamp(36px,5vw,66px);
  font-weight:600; color:#fff;
  letter-spacing:3px; line-height:1.1; margin-bottom:10px;
}
.hero-subtitle {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:clamp(15px,1.8vw,21px);
  color:rgba(255,255,255,0.72); letter-spacing:1px;
}
.hero-bottom { position:relative; z-index:2; }
.hero-nav { display:flex; margin-bottom:24px; }
.hero-nav a {
  font-size:15px; letter-spacing:3px; text-transform:uppercase;
  color:#fff; font-weight:700;
  margin-right:40px; text-decoration:none;
  padding:8px 20px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
  transition:all 0.2s;
}
.hero-nav a:hover { background:rgba(255,255,255,0.2); border-color:#fff; }
.hero-tags { display:flex; gap:10px; flex-wrap:wrap; }
.hero-tag {
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:#fff; padding:6px 16px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(4px);
}
@media (max-width:768px) {
  #hero { padding:32px 24px 40px; }
  .hero-nav a { margin-right:18px; font-size:10px; }
}
</style>
</head>
<body>
<div id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-top">
    <div class="hero-name">IRENE LEE</div>
    <div class="hero-subtitle">Oboe &amp; English Horn &nbsp;·&nbsp; 오보이스트 이세연</div>
  </div>
  <div class="hero-bottom">
    <nav class="hero-nav">
      <a href="bio.html">Bio</a>
      <a href="awards.html">Awards</a>
      <a href="video.html">Video</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="hero-tags">
      <div class="hero-tag">Juilliard Pre-College</div>
      <div class="hero-tag">YoungArts 2026 — Distinction</div>
      <div class="hero-tag">Verbier Festival</div>
      <div class="hero-tag">NYO2</div>
    </div>
  </div>
</div>
</body>
</html>
